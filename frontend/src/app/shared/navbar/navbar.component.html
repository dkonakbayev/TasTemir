<nav class="navbar">
    <a class="brand" routerLink="/about">TasTemir</a>
  
    <div class="links">
      <!-- Always visible -->
      <a routerLink="/about"    routerLinkActive="active">About</a>
      <a routerLink="/trainers" routerLinkActive="active">Trainers</a>
  
      <!-- User only -->
      @if (auth.isLoggedIn() && !auth.isAdmin()) {
        <a routerLink="/schedule"    routerLinkActive="active">Schedule</a>
        <a routerLink="/my-bookings" routerLinkActive="active">My Bookings</a>
        <a routerLink="/profile"     routerLinkActive="active">Profile</a>
        <button class="btn-logout" (click)="logout()">Logout</button>
      }
  
      <!-- Admin only -->
      @if (auth.isAdmin()) {
        <a routerLink="/admin/dashboard" routerLinkActive="active">Dashboard</a>
        <a routerLink="/admin/classes"   routerLinkActive="active">Classes</a>
        <a routerLink="/admin/bookings"  routerLinkActive="active">Bookings</a>
        <button class="btn-logout" (click)="logout()">Logout</button>
      }
  
      <!-- Not logged in -->
      @if (!auth.isLoggedIn()) {
        <a routerLink="/login" class="btn-login">Login</a>
      }
    </div>
  </nav>
